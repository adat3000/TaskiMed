<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/plantilla.xhtml">
    <ui:define name="contenido">
		<style>
			.view-dialog .ui-dialog-content {
			    padding: 0 !important;
			}
			
			.view-container {
			    padding: 20px;
			    font-family: "Roboto", sans-serif;
			}
			
			.view-title {
			    margin-bottom: 15px;
			}
			
			.view-title h2 {
			    font-size: 1.3rem;
			    margin: 0;
			    font-weight: 600;
			}
			
			.status-badge {
			    padding: 4px 10px;
			    border-radius: 6px;
			    font-size: 0.8rem;
			    color: white;
			    font-weight: 600;
			    display: inline-block;
			}
			
			/* Colores */
			.status-badge.new         { background: #6c757d; }
			.status-badge.in_progress { background: #f0ad4e; color:#222; }
			.status-badge.completed   { background: #28a745; }
			.status-badge.cancelled   { background: #dc3545; }
			
			.view-grid {
			    display: grid;
			    grid-template-columns: 120px 1fr;
			    row-gap: 10px;
			    column-gap: 10px;
			}
			
			.label {
			    font-weight: 600;
			    color: #555;
			}
			
			.value {
			    color: #000;
			}
		</style>
        <p:growl id="messageBox" showDetail="true" autoUpdate="true" />

        <h:form id="frm">
            <div class="container-fluid px-3">
                <p:outputPanel id="panelData">
                    <div class="table-responsive">
                        <p:dataTable id="data"
                                     var="Category"
                                     caption="Category"
                                     value="#{categoryBean.lazyModel}"
                                     widgetVar="tableEntity"
                                     paginator="true"
                                     paginatorPosition="bottom"
                                     lazy="true"
                                     rows="10"
                                     rowsPerPageTemplate="5,10,15,25,50"
                                     currentPageReportTemplate="{startRecord} - {endRecord} of {totalRecords} records"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     reflow="true"
                                     responsiveLayout="scroll"
                                     styleClass="table table-hover table-striped table-bordered table-sm"
                                     emptyMessage="No records"
                                     sortMode="single"
                                     rowKey="#{Category.id}"
                                     selectionMode="single"
                                     selection="#{categoryBean.selectedCategory}">

                            <f:facet name="header">
                                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">

                                    <!-- Column Toggler -->
                                    <div>
                                        <p:commandButton id="toggler" type="button" value="☰" styleClass="btn btn-outline-secondary" />
                                        <p:columnToggler datasource="data" trigger="toggler" />
                                    </div>

									<div class="me-3">
									    <p:commandButton value="Categories" type="button"
									        style="
									            padding: 0;
									            margin: 0;
									            border: none;
									            background: transparent;
									            color: #000000;
									            font-size: 1.3rem;
									            font-weight: 700;
									            border-bottom: 2px solid #007ad9;
									            box-shadow: none;
									            cursor: default;
									        " />
									</div>

                                    <!-- Buscar -->
                                    <div class="d-flex align-items-center flex-nowrap" style="white-space: nowrap;">
                                        <p:outputLabel for="globalFilter" value="Search:" styleClass="me-2" />
                                        <p:inputText id="globalFilter"
                                                     placeholder="Enter value to filter"
                                                     style="max-width: 200px;"
                                                     onkeypress="if (event.keyCode == 13) { PF('tableEntity').filter(); return false; }" />

                                        <p:commandButton id="btnBuscar"
                                                         icon="pi pi-search"
                                                         styleClass="btn btn-outline-secondary ms-2"
                                                         onclick="PF('tableEntity').filter(); return false;" />
                                    </div>

                                    <!-- Exportar -->
                                    <div>
                                        <p:commandButton value="Export to Excel" icon="pi pi-file-excel"
                                                         styleClass="btn btn-outline-secondary"
                                                         ajax="false">
                                            <p:dataExporter type="xlsx"
                                                            target="data"
                                                            fileName="categories"
                                                            exportHeader="true"
                                                            exportFooter="true" />
                                        </p:commandButton>
                                    </div>

                                    <!-- Botón Nuevo -->
                                    <div>
                                        <p:commandButton id="btnNuevo" value="New" icon="pi pi-fw pi-plus"
                                                         styleClass="btn btn-primary"
                                                         rendered="#{loginBean.admin}"
                                                         actionListener="#{categoryBean.clear()}"
                                                         oncomplete="PF('wdlgData').show();"
                                                         update=":dlgData">
                                            <f:setPropertyActionListener value="Create" target="#{categoryBean.action}" />
                                        </p:commandButton>
                                    </div>

                                </div>
                            </f:facet>

                            <!-- Columnas -->
                            <p:column headerText="ID" visible="false" sortBy="#{Category.id}" field="id" filterBy="#{Category.id}" filterStyle="display:none">
                                <h:outputLabel value="#{Category.id}" />
                            </p:column>

                            <p:column headerText="Category" sortBy="#{Category.name}" field="name" filterBy="#{Category.name}" filterStyle="display:none">
                                <h:outputLabel value="#{Category.name}" />
                            </p:column>

                            <p:column headerText="Alias" sortBy="#{Category.alias}" field="alias" filterBy="#{Category.alias}" filterStyle="display:none">
						        <span class="badge bg-primary">
						            #{Category.alias}
						        </span>
                            </p:column>

                            <p:column headerText="#{loginBean.admin ? 'Edit' : 'View'}" exportable="false">
							    <p:commandButton icon="pi pi-eye"
							                     update=":dlgViewCategory"
							                     oncomplete="PF('wdlgViewCategory').show();"
							                     process="@this"
							                     styleClass="ui-button-flat ui-button-plain"
							                     rendered="#{!loginBean.admin}">
							        <f:setPropertyActionListener value="#{Category}" target="#{categoryBean.selectedCategory}" />
							        <f:setPropertyActionListener value="Update" target="#{categoryBean.action}" />
							    </p:commandButton>
                                <p:commandButton icon="pi pi-pencil" oncomplete="PF('wdlgData').show();"
                                                 update=":dlgData, :messageBox"
							                     rendered="#{loginBean.admin}">
                                    <f:setPropertyActionListener value="Update" target="#{categoryBean.action}" />
                                    <f:setPropertyActionListener value="#{Category}" target="#{categoryBean.selectedCategory}" />
                                </p:commandButton>
                            </p:column>

                            <p:column headerText="Delete" exportable="false" rendered="#{loginBean.admin}">
                                <p:commandButton icon="pi pi-trash"
                                                 action="#{categoryBean.delete}"
                                                 update=":frm:data, :messageBox"
                                                 process="@this"
                                                 data-pfconfirmcommand="true"
							                     rendered="#{loginBean.admin}">
                                    <p:confirm header="Warning"
							                   message="If this category is currently in use, it will be permanently deleted from your tasks. Do you want to proceed?"
							                   icon="pi pi-exclamation-triangle" />
                                    <f:setPropertyActionListener value="#{Category}" target="#{categoryBean.selectedCategory}" />
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </div>
                </p:outputPanel>
            </div>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Yes" type="button"
                                 styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                <p:commandButton value="No" type="button"
                                 styleClass="ui-confirmdialog-no ui-button-flat" icon="pi pi-times" />
            </p:confirmDialog>
        </h:form>

        <!-- Diálogo de Nuevo/Editar -->
        <p:dialog id="dlgData" widgetVar="wdlgData" rendered="#{loginBean.admin}"
                  modal="true" appendTo="@(body)" closeOnEscape="true" resizable="true"
                  responsive="true" style="max-width: 150vw; overflow-x: hidden;"
                  header="#{categoryBean.action eq 'Update' ? 'Category Info':'New Category'}">

            <h:form id="frmNewEdit">
                <p:outputPanel id="panelNewEdit" style="overflow-y:auto; max-height:70vh; overflow-x:hidden;">
                    <div class="mx-auto px-3" style="max-width: 800px; width: 100%;">
                        <div class="card mt-3">
                            <div class="card-header bg-primary text-white">
                                Category Details
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <p><strong>Name:</strong>
                                            <p:inputText id="name" value="#{categoryBean.selectedCategory.name}" required="true" styleClass="form-control"/>
                                        </p>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <p><strong>Alias:</strong>
                                            <p:inputText id="alias" value="#{categoryBean.selectedCategory.alias}" maxlength="8" required="false" styleClass="form-control"/>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Botones -->
                        <div class="col-12 d-flex justify-content-center gap-3 mt-3">
                            <p:commandButton id="ok_button" value="Save"
                                             actionListener="#{categoryBean.ejecutar()}"
                                             process="@form"
                                             oncomplete="if (args &amp;&amp; !args.validationFailed) PF('wdlgData').hide();"
                                             update=":frmNewEdit:panelNewEdit :frm:panelData :messageBox"
                                             styleClass="btn btn-primary" />

                            <p:commandButton id="cancel_button" value="Cancel"
                                             immediate="true"
                                             oncomplete="PF('wdlgData').hide();"
                                             styleClass="btn btn-secondary">
                                <p:ajax update="panelNewEdit" resetValues="true" />
                            </p:commandButton>

                            <p:defaultCommand target="ok_button" />
                        </div>
                    </div>
                </p:outputPanel>
            </h:form>
        </p:dialog>
		<p:dialog id="dlgViewCategory"
		          widgetVar="wdlgViewCategory"
		          modal="true"
		          header="Category Details"
		          responsive="true"
		          resizable="true"
		          styleClass="view-dialog"
		          showEffect="fade" hideEffect="fade"
		          width="400px">
		    <h:form id="frmViewCategory">   <!-- ← FORM OBLIGATORIO -->
			
			    <h:panelGroup id="panelViewCategory" layout="block" styleClass="view-container">
			
			        <!-- Sección de Título -->
			        <div class="view-title">
			            #{categoryBean.selectedCategory.name}
			        </div>
			
			        <!-- Sección de Detalles -->
			        <div class="view-grid">
			            <div class="label">Category ID</div>
			            <div class="value">#{categoryBean.selectedCategory.id}</div>
			        </div>

			        <div class="view-grid">
			            <div class="label">Alias</div>
			            <div class="value">
					        <span class="badge bg-primary">
					            #{categoryBean.selectedCategory.alias}
					        </span>
			            </div>
			        </div>
	
	                <!-- Botones -->
	                <div class="form-actions-container">
	                    <p:commandButton id="ok_button" value="Save"
	                    				 rendered="#{loginBean.admin}"
	                                     actionListener="#{categoryBean.ejecutar()}"
                                         process="@form"
	                                     oncomplete="if (args &amp;&amp; !args.validationFailed) PF('wdlgViewCategory').hide();"
	                                     update=":frm:panelData :messageBox"
	                                     styleClass="custom-dlg-btn save-btn" />
	
	                    <p:commandButton id="cancel_button" value="Cancel"
	                                     immediate="true"
	                                     oncomplete="PF('wdlgViewCategory').hide();"
	                                     styleClass="custom-dlg-btn cancel-btn"/>
	                </div>
			
			    </h:panelGroup>
		    </h:form>
		</p:dialog>
    </ui:define>
</ui:composition>
</html>
