<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
	<h:outputStylesheet library="css" name="login.css"/>
</h:head>

<h:body>

    <p:growl id="messageBox" showDetail="true" autoUpdate="true" />

    <div class="login-card">
        <h:form id="frmLogin" prependId="false">
            
            <!-- Logo -->
            <div class="login-header">
                <p:graphicImage name="/images/logo360x240.jpg"
                                alt="Logo institucional"
                                styleClass="login-logo" />
                <div class="login-title">Login</div>
            </div>

            <!-- Campos -->
            <p:panelGrid columns="1" layout="grid" styleClass="ui-fluid formgrid grid" columnClasses="col-12">

                <p:outputLabel for="txt_username" value="Username" />
                <p:inputText id="txt_username"
                             value="#{loginBean.username}"
                             required="true"
                             autocomplete="off"
                             placeholder="Enter your username"
                             label="Usuario" />

                <p:outputLabel for="txt_password" value="Password" />
                <p:password id="txt_password"
                            value="#{loginBean.password}"
                            required="true"
                            feedback="false"
                            toggleMask="true"
                            autocomplete="off"
                            placeholder="Enter your password"
                            label="Contraseña" />

                <!-- Botones -->
                <p:commandButton id="btn_signin"
                                 value="Sign in"
                                 action="#{loginBean.login}"
                                 update="frmLogin messageBox"
                                 icon="pi pi-sign-in"
                                 styleClass="btn-login ui-button-raised" />

                <p:commandButton id="btn_cancel"
                                 value="Cancel"
                                 type="reset"
                                 icon="pi pi-refresh"
                                 styleClass="btn-cancel ui-button-raised" />

            </p:panelGrid>

            <p:defaultCommand target="btn_signin" />
        </h:form>
    </div>

    <!-- Prefill (solo para desarrollo) -->
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            document.getElementById('txt_username').value = 'cgarcia';
            document.getElementById('txt_password').value = 'Clinical2025!';
        });
    </script>

</h:body>
</html>
