<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:h="http://xmlns.jcp.org/jsf/html"
	  xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
	<ui:composition template="/WEB-INF/plantilla.xhtml">
	<ui:define name="contenido">
        <h:form id="form">
            <div class="container mt-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        Evaluación de Riesgo
                    </div>
                    <div class="card-body">
                        <h:panelGrid columns="2" columnClasses="label, value" style="width: 100%">
                            <h:outputLabel value="Edad:" for="age"/>
                            <p:inputText id="age" value="#{riskBean.input.age}" />

                            <h:outputLabel value="Colesterol:" for="cholesterol"/>
                            <p:inputText id="cholesterol" value="#{riskBean.input.cholesterol}" />

                            <h:outputLabel value="Presión:" for="pressure"/>
                            <p:inputText id="pressure" value="#{riskBean.input.pressure}" />
                        </h:panelGrid>

                        <div class="text-center mt-3">
                            <p:commandButton value="Calcular Riesgo"
                                             action="#{riskBean.evaluateRisk}"
                                             update="resultPanel"/>
                        </div>

                        <p:outputPanel id="resultPanel" style="margin-top:20px;">
                            <h:outputText value="Predicción: #{riskBean.result.risk}" />
                            <br/>
                            <h:outputText value="Confianza: #{riskBean.result.confidence}" />
                            <br/>
                            <h:outputText value="Fuente: #{riskBean.result.source}" />
                        </p:outputPanel>
                    </div>
                </div>
            </div>
        </h:form>

    <!-- Prefill (solo para desarrollo) -->
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            document.getElementById('form:age').value = '45';
            document.getElementById('form:cholesterol').value = '220';
            document.getElementById('form:pressure').value = '130';
        });
    </script>
	</ui:define>
</ui:composition>
</html>
